apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-app-of-apps
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    tcs/layer: bootstrap
spec:
  project: platform
  source:
    repoURL: https://github.com/tata-consulting/tcs-delivery-accelerators
    targetRevision: HEAD
    path: gitops/platform-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
